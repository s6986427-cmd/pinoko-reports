name: 全量業績更新

on:
  schedule:
    # 台北時間 01:00（UTC 17:00）
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安裝套件
        run: npm install

      - name: 安裝 Playwright 瀏覽器
        run: npx playwright install chromium --with-deps

      - name: 執行全量更新
        env:
          USHOW_ACCOUNT: ${{ secrets.USHOW_ACCOUNT }}
          USHOW_PASSWORD: ${{ secrets.USHOW_PASSWORD }}
        run: node update_pinoko.js full

      - name: Commit 並推送
        run: |
          git config user.name "pinoko-bot"
          git config user.email "bot@pinoko.local"
          git add -A
          git diff --staged --quiet || git commit -m "自動全量更新 $(TZ='Asia/Taipei' date '+%Y/%m/%d %H:%M')"
          git push
